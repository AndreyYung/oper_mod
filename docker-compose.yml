version: '3.8'

services:
  web:
    build: .
    volumes:
      - static:/app/static
      - media:/app/media
      - ./db.sqlite3:/app/db.sqlite3  # проброс файла базы данных

    expose:
      - 8000
    restart: always

  nginx:
    image: nginx:alpine
    container_name: oper_mod_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
      - "443:443"

    depends_on:
      - web
    restart: always

volumes:
  static:
  media: